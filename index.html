<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia Escolar Pro + AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        @media print { .no-print { display: none !important; } .print-only { display: block !important; } }
        .print-only { display: none; }
        .tab-active { background-color: #eff6ff; color: #2563eb; border-bottom: 2px solid #2563eb; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="app" class="flex flex-col min-h-screen">
        <header class="bg-white border-b border-slate-200 sticky top-0 z-30 no-print">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16 items-center">
                    <div class="flex items-center gap-3">
                        <div class="bg-blue-600 p-2 rounded-lg"><i data-lucide="graduation-cap" class="w-6 h-6 text-white"></i></div>
                        <span class="text-xl font-bold text-slate-900">Asistencia Pro</span>
                    </div>
                    <nav class="flex h-full">
                        <button onclick="switchTab('attendance')" id="tab-attendance" class="flex items-center gap-2 px-4 h-full text-sm font-medium transition-all border-b-2 border-transparent">
                            <i data-lucide="clipboard-list" class="w-5 h-5"></i> <span class="hidden md:inline">Asistencia</span>
                        </button>
                        <button onclick="switchTab('students')" id="tab-students" class="flex items-center gap-2 px-4 h-full text-sm font-medium transition-all border-b-2 border-transparent">
                            <i data-lucide="users" class="w-5 h-5"></i> <span class="hidden md:inline">Estudiantes</span>
                        </button>
                        <button onclick="switchTab('reports')" id="tab-reports" class="flex items-center gap-2 px-4 h-full text-sm font-medium transition-all border-b-2 border-transparent">
                            <i data-lucide="bar-chart-3" class="w-5 h-5"></i> <span class="hidden md:inline">Reportes</span>
                        </button>
                    </nav>
                    <button onclick="exportData()" class="p-2 text-slate-500 hover:text-blue-600"><i data-lucide="download" class="w-5 h-5"></i></button>
                </div>
            </div>
        </header>

        <main class="flex-1 max-w-7xl w-full mx-auto p-4 sm:p-6 lg:p-8">
            <!-- Asistencia -->
            <section id="section-attendance" class="space-y-6">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <div class="flex items-center gap-4">
                        <div class="bg-blue-50 p-3 rounded-xl"><i data-lucide="calendar" class="w-6 h-6 text-blue-600"></i></div>
                        <div>
                            <h2 class="text-xl font-bold text-slate-900">Llamado a Lista</h2>
                            <input type="date" id="attendance-date" onchange="loadAttendance()" class="text-slate-500 text-sm bg-transparent border-none focus:ring-0 cursor-pointer">
                        </div>
                    </div>
                    <select id="filter-grade-attendance" onchange="renderAttendanceList()" class="px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm">
                        <option value="all">Todos los grados</option>
                    </select>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b border-slate-200">
                            <tr>
                                <th class="px-6 py-4 text-sm font-bold text-slate-700">Estudiante</th>
                                <th class="px-6 py-4 text-sm font-bold text-slate-700 text-center">Estado</th>
                                <th class="px-6 py-4 text-sm font-bold text-slate-700 text-right no-print">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="attendance-list" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </section>

            <!-- Estudiantes -->
            <section id="section-students" class="hidden space-y-6">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <div>
                        <h2 class="text-xl font-bold text-slate-900">Estudiantes</h2>
                        <p id="student-count" class="text-slate-500 text-xs font-medium">0 registrados</p>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        <button onclick="clearAllStudents()" class="flex items-center gap-2 px-4 py-2 bg-red-50 text-red-600 font-bold rounded-xl hover:bg-red-100 transition-all">
                            <i data-lucide="trash-2" class="w-5 h-5"></i> Limpiar Todo
                        </button>
                        <button onclick="openModal('import')" class="flex items-center gap-2 px-4 py-2 bg-green-50 text-green-600 font-bold rounded-xl hover:bg-green-100 transition-all">
                            <i data-lucide="file-spreadsheet" class="w-5 h-5"></i> Importar Excel
                        </button>
                        <button onclick="openModal('student')" class="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition-all">
                            <i data-lucide="user-plus" class="w-5 h-5"></i> Nuevo
                        </button>
                    </div>
                </div>
                <div id="student-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </section>

            <!-- Reportes -->
            <section id="section-reports" class="hidden space-y-8">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="font-bold mb-4">Asistencia por Grado</h3>
                    <canvas id="gradeChart"></canvas>
                </div>
            </section>
        </main>
    </div>

    <!-- Modales -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div id="modal-student" class="bg-white rounded-2xl shadow-2xl max-w-lg w-full p-6 hidden">
            <h3 class="text-xl font-bold mb-6" id="modal-title">Nuevo Estudiante</h3>
            <form id="student-form" class="space-y-4">
                <input type="hidden" id="edit-id">
                <input type="text" id="s-name" placeholder="Nombre" required class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                <input type="text" id="s-grade" placeholder="Grado" required class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                <input type="text" id="s-phone" placeholder="Teléfono" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                <div class="flex gap-3">
                    <button type="button" onclick="closeModal()" class="flex-1 py-3 border border-slate-200 rounded-xl font-bold">Cancelar</button>
                    <button type="submit" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold">Guardar</button>
                </div>
            </form>
        </div>

        <div id="modal-import" class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6 hidden">
            <h3 class="text-xl font-bold mb-4">Importar Excel</h3>
            <p class="text-xs text-slate-500 mb-4">Asegúrate de que la columna A sea el Nombre y la B el Grado.</p>
            <input type="file" id="excel-file" accept=".xlsx" class="mb-6 block w-full text-sm">
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-3 border border-slate-200 rounded-xl font-bold">Cerrar</button>
                <button onclick="processExcel()" class="flex-1 py-3 bg-green-600 text-white rounded-xl font-bold">Procesar</button>
            </div>
        </div>
    </div>

    <script>
        let students = JSON.parse(localStorage.getItem('students')) || [];
        let attendance = JSON.parse(localStorage.getItem('attendance')) || {};

        const saveData = () => {
            localStorage.setItem('students', JSON.stringify(students));
            localStorage.setItem('attendance', JSON.stringify(attendance));
            updateGradesFilter();
            updateStudentCount();
        };

        function updateStudentCount() {
            document.getElementById('student-count').innerText = `${students.length} registrados`;
        }

        function switchTab(tab) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`section-${tab}`).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
            if(tab === 'students') renderStudents();
            if(tab === 'attendance') renderAttendanceList();
            if(tab === 'reports') renderCharts();
        }

        function renderStudents() {
            const grid = document.getElementById('student-grid');
            if(students.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-slate-400">No hay estudiantes.</div>`;
            } else {
                grid.innerHTML = students.map(s => `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex justify-between items-center">
                        <div>
                            <h3 class="font-bold text-slate-900">${s.name}</h3>
                            <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full">${s.grade}</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editStudent('${s.id}')" class="text-slate-400 hover:text-blue-600"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                            <button onclick="deleteStudent('${s.id}')" class="text-slate-400 hover:text-red-600"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                `).join('');
            }
            lucide.createIcons();
            updateStudentCount();
        }

        function clearAllStudents() {
            if(confirm('¿BORRAR TODO EL LISTADO? Esta acción no se puede deshacer.')) {
                students = [];
                saveData();
                renderStudents();
                updateGradesFilter();
                alert('Listado vaciado.');
            }
        }

        function deleteStudent(id) {
            if(confirm('¿Eliminar estudiante?')) {
                students = students.filter(s => s.id !== id);
                saveData();
                renderStudents();
                updateGradesFilter();
            }
        }

        function processExcel() {
            const fileInput = document.getElementById('excel-file');
            const file = fileInput.files[0];
            if(!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const data = e.target.result;
                const workbook = XLSX.read(data, { type: 'binary' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                
                // Obtenemos los datos como una matriz de matrices (filas y columnas puras)
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                
                if(rows.length < 2) {
                    alert('El archivo no tiene suficientes datos.');
                    return;
                }

                // Buscamos en qué columna está cada cosa analizando la primera fila
                const headers = rows[0].map(h => String(h).toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, ""));
                
                let nameIdx = headers.findIndex(h => h.includes('nombre') || h.includes('estudiante'));
                let gradeIdx = headers.findIndex(h => h.includes('grado') || h.includes('curso'));
                let phoneIdx = headers.findIndex(h => h.includes('telefono') || h.includes('celular'));

                // Si no encuentra por nombre, usamos las posiciones por defecto A=0, B=1
                if(nameIdx === -1) nameIdx = 0;
                if(gradeIdx === -1) gradeIdx = 1;
                if(phoneIdx === -1) phoneIdx = 2;

                const newStudents = [];
                for(let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if(row[nameIdx]) { // Solo agregamos si hay un nombre
                        newStudents.push({
                            id: Math.random().toString(36).substr(2, 9),
                            name: String(row[nameIdx] || "Sin Nombre").trim(),
                            grade: String(row[gradeIdx] || "Sin Grado").trim(),
                            phone: String(row[phoneIdx] || "").trim()
                        });
                    }
                }

                students = students.concat(newStudents);
                saveData();
                closeModal();
                renderStudents();
                updateGradesFilter();
                alert(`Se importaron ${newStudents.length} estudiantes correctamente.`);
            };
            reader.readAsBinaryString(file);
        }

        function renderAttendanceList() {
            const date = document.getElementById('attendance-date').value;
            const gradeFilter = document.getElementById('filter-grade-attendance').value;
            const list = document.getElementById('attendance-list');
            
            const filtered = students.filter(s => gradeFilter === 'all' || s.grade === gradeFilter);
            
            if(filtered.length === 0) {
                list.innerHTML = `<tr><td colspan="3" class="p-10 text-center text-slate-400">No hay estudiantes en este grado.</td></tr>`;
            } else {
                list.innerHTML = filtered.map(s => {
                    const record = attendance[date]?.[s.id] || { status: 'pending' };
                    return `
                        <tr class="hover:bg-slate-50">
                            <td class="px-6 py-4">
                                <div class="font-medium text-slate-900">${s.name}</div>
                                <div class="text-xs text-slate-400">${s.grade}</div>
                            </td>
                            <td class="px-6 py-4 flex justify-center gap-2">
                                <button onclick="markAttendance('${s.id}', 'present')" class="p-2 rounded-lg ${record.status === 'present' ? 'bg-green-100 text-green-600' : 'bg-slate-100 text-slate-400'}"><i data-lucide="check-circle-2" class="w-6 h-6"></i></button>
                                <button onclick="markAttendance('${s.id}', 'absent')" class="p-2 rounded-lg ${record.status === 'absent' ? 'bg-red-100 text-red-600' : 'bg-slate-100 text-slate-400'}"><i data-lucide="x-circle" class="w-6 h-6"></i></button>
                            </td>
                            <td class="px-6 py-4 text-right no-print">
                                <button class="p-2 text-slate-400"><i data-lucide="message-square" class="w-5 h-5"></i></button>
                            </td>
                        </tr>
                    `;
                }).join('');
            }
            lucide.createIcons();
        }

        function markAttendance(studentId, status) {
            const date = document.getElementById('attendance-date').value;
            if(!attendance[date]) attendance[date] = {};
            attendance[date][studentId] = { status };
            saveData();
            renderAttendanceList();
        }

        function updateGradesFilter() {
            const filter = document.getElementById('filter-grade-attendance');
            if(!filter) return;
            const grades = [...new Set(students.map(s => s.grade))].sort();
            let options = '<option value="all">Todos los grados</option>';
            grades.forEach(g => {
                options += `<option value="${g}">${g}</option>`;
            });
            filter.innerHTML = options;
        }

        function openModal(type) {
            document.getElementById('modal-overlay').classList.remove('hidden');
            document.getElementById(`modal-${type}`).classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.add('hidden');
            document.querySelectorAll('#modal-overlay > div').forEach(d => d.classList.add('hidden'));
        }

        function exportData() {
            const data = { students, attendance };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `asistencia_backup.json`;
            a.click();
        }

        window.onload = () => {
            document.getElementById('attendance-date').value = new Date().toISOString().split('T')[0];
            updateGradesFilter();
            switchTab('attendance');
            lucide.createIcons();
        };
    </script>
</body>
</html>
